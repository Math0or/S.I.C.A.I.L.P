<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Chamadas</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: #f0f2f5;
      color: #222;
      padding: 24px;
    }

    h1 {
      text-align: center;
      color: #1f4e79;
      margin-bottom: 4px;
    }

    p.subtitle {
      text-align: center;
      color: #666;
      margin-top: 0;
      margin-bottom: 24px;
    }

    #lista {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .alerta {
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      color: #fff;
    }

    .alerta.suporte {
      background: #f0ad4e;
    }

    .alerta.urgente {
      background: #d9534f;
      animation: pulsar 1s infinite;
    }

    .info strong {
      font-size: 18px;
      display: block;
    }

    .info span {
      font-size: 14px;
      opacity: 0.9;
    }

    .atender {
      background: rgba(255,255,255,0.25);
      border: none;
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .atender:hover {
      background: rgba(255,255,255,0.4);
    }

    .vazio {
      text-align: center;
      color: #999;
      margin-top: 40px;
    }

    @keyframes pulsar {
      0%   { box-shadow: 0 0 0 0 rgba(217, 83, 79, 0.6); }
      70%  { box-shadow: 0 0 0 14px rgba(217, 83, 79, 0); }
      100% { box-shadow: 0 0 0 0 rgba(217, 83, 79, 0); }
    }
  </style>
</head>
<body>
  <h1>Painel de Chamadas</h1>
  <p class="subtitle">Notificacoes recebidas</p>

  <div id="lista"></div>

  <script>
    async function carregarAlertas() {
      try {
        const resposta = await fetch('/api/chamadas');
        const alertas = await resposta.json();
        renderizar(alertas);
      } catch (erro) {
        console.error('Erro ao buscar alertas:', erro);
      }
    }

    function renderizar(alertas) {
      const lista = document.getElementById('lista');
      lista.innerHTML = '';

      if (alertas.length === 0) {
        lista.innerHTML = '<p class="vazio">Nenhuma chamada no momento.</p>';
        return;
      }

      alertas.forEach(alerta => {
        const item = document.createElement('div');
        const classeTipo = alerta.tipo === 'URGENTE' ? 'urgente' : 'suporte';
        item.className = 'alerta ' + classeTipo;

        item.innerHTML = `
          <div class="info">
            <strong>${alerta.tipo} - ${alerta.dispositivo}</strong>
            <span>${alerta.horario}</span>
          </div>
          <button class="atender" onclick="atender(${alerta.id})">Atendido</button>
        `;

        lista.appendChild(item);
      });
    }

    async function atender(id) {
      await fetch('/api/chamada/' + id, { method: 'DELETE' });
      carregarAlertas();
    }

    carregarAlertas();
    setInterval(carregarAlertas, 3000);
  </script>
</body>
</html>
